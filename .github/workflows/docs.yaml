name: docs

on:
  push:
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install sv2v
        uses: ./.github/actions/install-sv2v

      - name: sv2v
        run: make sv2v

      - name: Build docs
        uses: TinyTapeout/tt-gds-action/docs@ttgf26a
